<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognised Attendance Monitoring System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .camera-frame {
            width: 100%;
            height: auto;
            border-radius: 10px;
            border: 3px solid #007bff;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }
        .card {
            border-radius: 12px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 40px;
            font-weight: 600;
        }
        table {
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <h1>Face Recognised Attendance Monitoring System IIT Dholakpur</h1>

    <div class="row">
        <!-- Camera Feed -->
        <div class="col-md-6">
            <div class="card text-white bg-primary mb-3">
                <div class="card-header">Live Camera</div>
                <div class="card-body bg-light text-center">
                    <img src="{{ url_for('video_feed') }}" class="camera-frame" alt="Live Video Feed">
                </div>
            </div>
        </div>

        <!-- Attendance Table -->
        <div class="col-md-6">
            <div class="card text-white bg-success mb-3">
                <div class="card-header">Attendance List</div>
                <div class="card-body bg-light">
                    <table class="table table-striped" id="attendanceTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for record in attendance %}
                            <tr>
                                <td>{{ record['Name'] }}</td>
                                <td>{{ record['Date'] }}</td>
                                <td>{{ record['Time'] }}</td>
                                <td>{{ record['Status'] }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Automatically refresh attendance table every 5 seconds
    setInterval(() => {
        fetch("/attendance_data")
            .then(res => res.json())
            .then(data => {
                let tableBody = document.querySelector("#attendanceTable tbody");
                tableBody.innerHTML = "";
                data.forEach(row => {
                    let tr = document.createElement("tr");
                    tr.innerHTML = `<td>${row.Name}</td><td>${row.Date}</td><td>${row.Time}</td><td>${row.Status}</td>`;
                    tableBody.appendChild(tr);
                });
            });
    }, 5000);
</script>

</body>
</html>
